version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: jaraviea-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jaraviea_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: jaraviea-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    container_name: jaraviea-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/jaraviea_db?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=jaraviea_super_secret_key_123_456_789
      - JWT_REFRESH_SECRET=jaraviea_refresh_secret_key_999_888_777
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - postgres
      - redis
    volumes:
      - uploads_data:/app/public/uploads

  frontend:
    build: ./frontend
    container_name: jaraviea-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  uploads_data:
